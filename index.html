<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMO-SCANNER v5</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 {
            color: #006633;
            margin-bottom: 20px;
        }
        .mode-container {
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            font-weight: bold;
        }
        select {
            padding: 5px 10px;
            font-size: 16px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        .scanner-box {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 4 / 3; /* Sigurado nga saktong porma sa camera view */
            border: 4px solid #006633;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            position: relative;
        }
        #reader {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
        }
        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }
        .status-text {
            margin: 15px 0;
            font-weight: bold;
            color: #333;
        }
        table {
            width: 100%;
            max-width: 800px;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        th {
            background-color: #003314;
            color: white;
            text-align: left;
            padding: 12px;
            text-transform: uppercase;
            font-size: 14px;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

    <h2>HRMO-SCANNER v5</h2>

    <div class="mode-container">
        MODE: 
        <select id="scanMode">
            <option value="TIME IN">TIME IN</option>
            <option value="TIME OUT">TIME OUT</option>
        </select>
    </div>

    <div class="scanner-box">
        <div id="reader"></div>
    </div>

    <div class="status-text" id="statusLabel">Initializing camera...</div>

    <table>
        <thead>
            <tr>
                <th>Office-Name</th>
                <th>Time</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="logsTableBody">
        </tbody>
    </table>

    <script>
        // 1. KONEKTA SA SUPABASE (Gi-ayo ang Capital 'S' sa Supabase.createClient)
        const SUPABASE_URL = "https://hcoxahlhrouwpanaolxu.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_OAGKVIw6ZBAtUqFNqbhuCA_6kGaqj3X";
        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const statusLabel = document.getElementById('statusLabel');
        const logsTableBody = document.getElementById('logsTableBody');
        const scanMode = document.getElementById('scanMode');
        
        let isProcessing = false;

        // 2. MAG-LOAD OG DATA GIKAN SA DATABASE
        async function fetchLogs() {
            try {
                const { data, error } = await supabase
                    .from('attendance_logs')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(10);

                if (error) throw error;

                logsTableBody.innerHTML = "";
                data.forEach(log => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${log.office_name || '—'}</td>
                        <td>${log.time || '—'}</td>
                        <td>${log.status || '—'}</td>
                    `;
                    logsTableBody.appendChild(row);
                });
            } catch (err) {
                console.error("Error fetching logs:", err);
            }
        }

        // 3. INIG MAAYO ANG PAG-SCAN SA QR CODE
        async function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;

            statusLabel.innerText = "Processing scan...";
            statusLabel.style.color = "#ff9900";
            
            const currentTimeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const selectedMode = scanMode.value;
            const officeName = decodedText; 

            try {
                const { error } = await supabase
                    .from('attendance_logs')
                    .insert([{ office_name: officeName, time: currentTimeStr, status: selectedMode }]);

                if (error) throw error;

                statusLabel.innerText = `Successfully Scanned: ${officeName} (${selectedMode})`;
                statusLabel.style.color = "#006633";
                await fetchLogs();
            } catch (err) {
                statusLabel.innerText = "Error saving to storage!";
                statusLabel.style.color = "#cc0000";
                console.error(err);
            }

            setTimeout(() => {
                isProcessing = false;
                statusLabel.innerText = "Ready for scanning...";
                statusLabel.style.color = "#333";
            }, 3000);
        }

        // 4. DIREKTA NGA PAG-START SA CAMERA
        const html5QrCode = new Html5Qrcode("reader");
        
        const config = { 
            fps: 15, 
            qrbox: (width, height) => {
                return { width: Math.min(width * 0.7, 250), height: Math.min(height * 0.7, 250) };
            }
        };

        // Pag-abli gamit ang user-facing/back-camera setup
        html5QrCode.start(
            { facingMode: "environment" }, 
            config, 
            onScanSuccess
        ).then(() => {
            statusLabel.innerText = "Ready for scanning...";
        }).catch(err => {
            console.error("Camera start error:", err);
            statusLabel.innerText = "Camera access error. Please check permissions or close other camera apps.";
            statusLabel.style.color = "#cc0000";
        });

        // Pag-load sa logs inig abri
        fetchLogs();
    </script>
</body>
</html>
